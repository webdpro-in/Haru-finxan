<!DOCTYPE html>
<html>
<head>
  <title>Test Frontend Image Display</title>
  <style>
    body { 
      font-family: monospace; 
      padding: 20px; 
      background: #1a1a1a; 
      color: #fff; 
    }
    button { 
      padding: 15px 30px; 
      margin: 10px; 
      font-size: 18px; 
      cursor: pointer; 
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover { background: #3a8cd4; }
    .images { 
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px; 
      margin-top: 20px; 
    }
    .images img { 
      width: 100%; 
      height: 250px; 
      object-fit: cover; 
      border: 3px solid #4facfe;
      border-radius: 8px;
    }
    .log { 
      background: #000; 
      padding: 10px; 
      margin: 5px 0; 
      border-left: 3px solid #4facfe;
      font-size: 12px;
    }
    .success { border-left-color: #00ff00; }
    .error { border-left-color: #ff0000; }
    .info { border-left-color: #ffaa00; }
  </style>
</head>
<body>
  <h1>🧪 Test Frontend Image Display</h1>
  
  <button onclick="testChatAPI()">🚀 Test Chat API (Backend)</button>
  <button onclick="testImageStorage()">💾 Test Image Storage (Frontend)</button>
  <button onclick="clearAll()">🧹 Clear All</button>
  
  <div id="log"></div>
  <div id="images" class="images"></div>

  <script>
    const API_URL = 'http://localhost:3001/api';
    
    function log(msg, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logDiv.appendChild(entry);
      console.log(msg);
    }
    
    function showImages(images) {
      const imagesDiv = document.getElementById('images');
      log(`📸 Displaying ${images.length} images`, 'info');
      
      images.forEach((url, i) => {
        log(`   Image ${i + 1}: ${url.substring(0, 60)}...`, 'info');
        
        const img = document.createElement('img');
        img.src = url;
        img.alt = `Image ${i + 1}`;
        
        img.onerror = () => {
          log(`❌ Failed to load image ${i + 1}`, 'error');
        };
        
        img.onload = () => {
          log(`✅ Loaded image ${i + 1}`, 'success');
        };
        
        imagesDiv.appendChild(img);
      });
    }
    
    function clearAll() {
      document.getElementById('images').innerHTML = '';
      document.getElementById('log').innerHTML = '';
      log('🧹 Cleared', 'info');
    }
    
    async function testChatAPI() {
      log('🧪 Testing Chat API...', 'info');
      log('📡 Sending request to /api/chat', 'info');
      
      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            message: 'explain photosynthesis',
            context: ''
          })
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        
        log('✅ Response received', 'success');
        log(`   Text length: ${data.response?.length || 0} chars`, 'info');
        log(`   Images count: ${data.images?.length || 0}`, 'info');
        
        if (data.images && data.images.length > 0) {
          log(`✅ Backend returned ${data.images.length} images!`, 'success');
          showImages(data.images);
        } else {
          log('⚠️ No images in response!', 'error');
          log(`   Response keys: ${Object.keys(data).join(', ')}`, 'info');
        }
        
      } catch (error) {
        log(`❌ Error: ${error.message}`, 'error');
      }
    }
    
    async function testImageStorage() {
      log('🧪 Testing Image Storage (simulating frontend flow)...', 'info');
      
      // Simulate what InputPanel.tsx does
      const mockImages = [
        'https://image.pollinations.ai/prompt/test1?width=800&height=600',
        'https://image.pollinations.ai/prompt/test2?width=800&height=600',
        'https://image.pollinations.ai/prompt/test3?width=800&height=600'
      ];
      
      log(`💾 Simulating storage of ${mockImages.length} images`, 'info');
      
      // Store in a mock state
      const mockState = { generatedImages: [] };
      mockImages.forEach((img, index) => {
        mockState.generatedImages.push(img);
        log(`   Added image ${index + 1} to state`, 'success');
      });
      
      log(`✅ State now has ${mockState.generatedImages.length} images`, 'success');
      showImages(mockState.generatedImages);
    }
    
    // Auto-run test on load
    window.addEventListener('DOMContentLoaded', () => {
      log('🎬 Page loaded - ready to test!', 'info');
      log('💡 Click "Test Chat API" to verify backend returns images', 'info');
      log('💡 Click "Test Image Storage" to verify images can display', 'info');
    });
  </script>
</body>
</html>
