<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 1: Confusion Detection Trigger</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #080c10;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* Left Side - Haru */
    .left-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0e14 0%, #1a1e24 100%);
      border-right: 2px solid #1e2a38;
      position: relative;
    }

    .haru-container {
      width: 300px;
      height: 400px;
      position: relative;
    }

    .haru-face {
      width: 100%;
      height: 100%;
    }

    .status-indicator {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      padding: 8px 16px;
      border-radius: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      border: 1px solid #00e5ff;
    }

    .wrong-streak {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      border: 2px solid #ff3d5a;
    }

    .wrong-streak.active {
      animation: pulse 1s infinite;
    }

    /* Right Side - Chat */
    .right-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0d1117;
    }

    .chat-header {
      padding: 20px;
      background: #161b22;
      border-bottom: 2px solid #1e2a38;
    }

    .chat-header h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .mode-indicator {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #00e5ff;
      transition: all 0.3s ease;
    }

    .mode-indicator.analogy {
      color: #ffd600;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }

    .message.student {
      text-align: right;
    }

    .message-bubble {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      max-width: 70%;
    }

    .message.student .message-bubble {
      background: #00e5ff;
      color: #000;
    }

    .message.haru .message-bubble {
      background: #1e2a38;
      color: #fff;
    }

    .latency {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }

    .answer-choices {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .choice-btn {
      padding: 10px 20px;
      background: #1e2a38;
      border: 2px solid #00e5ff;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .choice-btn:hover {
      background: #00e5ff;
      color: #000;
    }

    .choice-btn.correct {
      background: #00ff88;
      color: #000;
      border-color: #00ff88;
    }

    .choice-btn.wrong {
      background: #ff3d5a;
      border-color: #ff3d5a;
    }

    .chat-input {
      padding: 20px;
      background: #161b22;
      border-top: 2px solid #1e2a38;
      display: flex;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      padding: 12px;
      background: #0d1117;
      border: 2px solid #1e2a38;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
    }

    .chat-input button {
      padding: 12px 24px;
      background: #00e5ff;
      border: none;
      color: #000;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .chat-input button:hover {
      background: #00bcd4;
    }

    .confusion-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #ff3d5a;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .confusion-banner.show {
      transform: translateY(0);
      animation: pulse 1s infinite;
    }

    .chat-border {
      transition: box-shadow 0.3s ease;
    }

    .chat-border.confused {
      box-shadow: 0 0 30px rgba(255, 61, 90, 0.5);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="confusion-banner" id="confusionBanner">
    ⚠️ Confusion Detected — Switching explanation style
  </div>

  <div class="container">
    <!-- Left Side: Haru -->
    <div class="left-side">
      <div class="status-indicator">Explanation Mode: <span id="modeText">Standard</span></div>
      
      <div class="haru-container">
        <svg class="haru-face" viewBox="0 0 300 400" id="haruFace">
          <!-- Face -->
          <ellipse cx="150" cy="200" rx="120" ry="140" fill="#ffd5b5" stroke="#000" stroke-width="2"/>
          
          <!-- Hair -->
          <path d="M 30 180 Q 30 80 150 60 Q 270 80 270 180" fill="#4a3728" stroke="#000" stroke-width="2"/>
          <ellipse cx="150" cy="100" rx="130" ry="90" fill="#4a3728" stroke="#000" stroke-width="2"/>
          
          <!-- Eyes -->
          <g id="eyes">
            <ellipse cx="110" cy="180" rx="20" ry="25" fill="#fff" stroke="#000" stroke-width="2"/>
            <ellipse cx="190" cy="180" rx="20" ry="25" fill="#fff" stroke="#000" stroke-width="2"/>
            <circle cx="110" cy="185" r="10" fill="#2c1810" id="leftPupil"/>
            <circle cx="190" cy="185" r="10" fill="#2c1810" id="rightPupil"/>
            <circle cx="113" cy="182" r="4" fill="#fff"/>
            <circle cx="193" cy="182" r="4" fill="#fff"/>
          </g>
          
          <!-- Eyebrows -->
          <path d="M 85 160 Q 110 155 135 160" stroke="#2c1810" stroke-width="4" fill="none" stroke-linecap="round" id="leftBrow"/>
          <path d="M 165 160 Q 190 155 215 160" stroke="#2c1810" stroke-width="4" fill="none" stroke-linecap="round" id="rightBrow"/>
          
          <!-- Nose -->
          <line x1="150" y1="200" x2="150" y2="215" stroke="#000" stroke-width="1"/>
          
          <!-- Mouth -->
          <path d="M 120 240 Q 150 260 180 240" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round" id="mouth"/>
          
          <!-- Blush -->
          <ellipse cx="80" cy="220" rx="15" ry="10" fill="#ffb3ba" opacity="0.6" id="leftBlush"/>
          <ellipse cx="220" cy="220" rx="15" ry="10" fill="#ffb3ba" opacity="0.6" id="rightBlush"/>
          
          <!-- Collar -->
          <rect x="100" y="340" width="100" height="60" fill="#fff" stroke="#000" stroke-width="2"/>
          <polygon points="150,340 130,380 170,380" fill="#ff3d5a"/>
        </svg>
      </div>

      <div class="wrong-streak" id="wrongStreak">
        Wrong streak: <span id="streakCount">0</span> / 3
      </div>
    </div>

    <!-- Right Side: Chat -->
    <div class="right-side chat-border" id="chatBorder">
      <div class="chat-header">
        <h2>Chat with Haru</h2>
        <div class="mode-indicator" id="modeIndicator">Explanation Mode: Standard</div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Ask Haru a question..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    let wrongStreak = 0;
    let currentMode = 'standard';
    let currentQuestion = null;

    const QA_PAIRS = [
      {
        question: "What is 1/2 + 1/4?",
        answer: "To add fractions, we need a common denominator. Look at the diagram showing how 1/2 equals 2/4. So 2/4 + 1/4 = 3/4.",
        analogyAnswer: "Think of pizza! If you have half a pizza (1/2) and someone gives you a quarter slice (1/4), you now have 3 quarters of a pizza. That's 3/4! 🍕",
        choices: [
          { text: "3/4", correct: true },
          { text: "2/6", correct: false },
          { text: "1/6", correct: false }
        ]
      },
      {
        question: "Solve: 2x + 5 = 15",
        answer: "We need to isolate x. First subtract 5 from both sides: 2x = 10. Then divide by 2: x = 5.",
        analogyAnswer: "Imagine you have 2 bags of marbles (2x) plus 5 loose marbles, totaling 15 marbles. If you remove the 5 loose ones, you have 10 marbles in 2 bags. So each bag has 5 marbles! x = 5 🎒",
        choices: [
          { text: "x = 5", correct: true },
          { text: "x = 10", correct: false },
          { text: "x = 7.5", correct: false }
        ]
      },
      {
        question: "What is the quadratic formula?",
        answer: "The quadratic formula is x = (-b ± √(b²-4ac)) / 2a. It solves equations in the form ax² + bx + c = 0.",
        analogyAnswer: "Think of it like a recipe! You have ingredients (a, b, c) and the formula tells you exactly how to mix them to find x. The ± means you get two possible answers, like two paths to the same destination! 🛤️",
        choices: [
          { text: "x = (-b ± √(b²-4ac)) / 2a", correct: true },
          { text: "x = -b / 2a", correct: false },
          { text: "x = √(b²-4ac)", correct: false }
        ]
      },
      {
        question: "What is 3/5 as a decimal?",
        answer: "To convert a fraction to decimal, divide the numerator by denominator: 3 ÷ 5 = 0.6",
        analogyAnswer: "Imagine you have 5 cookies and you eat 3 of them. You ate 0.6 (or 60%) of the cookies! That's what 3/5 means in decimal form. 🍪",
        choices: [
          { text: "0.6", correct: true },
          { text: "0.35", correct: false },
          { text: "0.53", correct: false }
        ]
      },
      {
        question: "What is the Pythagorean theorem?",
        answer: "The Pythagorean theorem states that in a right triangle, a² + b² = c², where c is the hypotenuse.",
        analogyAnswer: "Imagine building a ladder against a wall! The ground distance (a), wall height (b), and ladder length (c) always follow this magic rule: a² + b² = c². It's like nature's building code! 🪜",
        choices: [
          { text: "a² + b² = c²", correct: true },
          { text: "a + b = c", correct: false },
          { text: "a² = b² + c²", correct: false }
        ]
      }
    ];

    let currentQAIndex = 0;

    function addMessage(sender, text, latency = null) {
      const messagesDiv = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;
      
      messageDiv.appendChild(bubble);
      
      if (latency) {
        const latencyDiv = document.createElement('div');
        latencyDiv.className = 'latency';
        latencyDiv.textContent = `Response time: ${latency}ms`;
        messageDiv.appendChild(latencyDiv);
      }
      
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showAnswerChoices(choices) {
      const messagesDiv = document.getElementById('chatMessages');
      const choicesDiv = document.createElement('div');
      choicesDiv.className = 'answer-choices';
      
      choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;
        btn.onclick = () => handleAnswer(choice.correct, btn);
        choicesDiv.appendChild(btn);
      });
      
      messagesDiv.appendChild(choicesDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function handleAnswer(correct, btn) {
      // Disable all choice buttons
      document.querySelectorAll('.choice-btn').forEach(b => {
        b.style.pointerEvents = 'none';
      });

      if (correct) {
        btn.classList.add('correct');
        wrongStreak = 0;
        updateStreakDisplay();
        updateHaruEmotion('happy');
        
        setTimeout(() => {
          addMessage('haru', 'Excellent! You got it right! 🌸', Math.floor(Math.random() * 170) + 280);
          setTimeout(askNextQuestion, 2000);
        }, 500);
      } else {
        btn.classList.add('wrong');
        wrongStreak++;
        updateStreakDisplay();
        
        if (wrongStreak >= 3) {
          triggerConfusionDetection();
        } else {
          updateHaruEmotion('thinking');
          setTimeout(() => {
            addMessage('haru', 'Not quite. Let me give you a hint and try again!', Math.floor(Math.random() * 170) + 280);
            setTimeout(askNextQuestion, 2000);
          }, 500);
        }
      }
    }

    function triggerConfusionDetection() {
      console.log('🚨 CONFUSION DETECTED - Wrong streak reached 3');
      
      // Show banner
      const banner = document.getElementById('confusionBanner');
      banner.classList.add('show');
      
      // Change chat border
      const chatBorder = document.getElementById('chatBorder');
      chatBorder.classList.add('confused');
      
      // Update mode
      currentMode = 'analogy';
      const modeIndicator = document.getElementById('modeIndicator');
      modeIndicator.textContent = 'Explanation Mode: Analogy-Based';
      modeIndicator.classList.add('analogy');
      
      const modeText = document.getElementById('modeText');
      modeText.textContent = 'Analogy-Based';
      
      // Change Haru emotion
      updateHaruEmotion('confused');
      
      setTimeout(() => {
        addMessage('haru', "I notice you're struggling. Let me try a different way! 💡", 320);
        
        setTimeout(() => {
          // Give analogy-based answer
          const qa = QA_PAIRS[currentQAIndex];
          addMessage('haru', qa.analogyAnswer, Math.floor(Math.random() * 170) + 280);
          
          // Reset
          wrongStreak = 0;
          updateStreakDisplay();
          updateHaruEmotion('happy');
          
          setTimeout(() => {
            banner.classList.remove('show');
            chatBorder.classList.remove('confused');
            askNextQuestion();
          }, 4000);
        }, 2000);
      }, 1000);
    }

    function updateStreakDisplay() {
      const streakCount = document.getElementById('streakCount');
      const streakDiv = document.getElementById('wrongStreak');
      streakCount.textContent = wrongStreak;
      
      if (wrongStreak >= 2) {
        streakDiv.classList.add('active');
      } else {
        streakDiv.classList.remove('active');
      }
    }

    function updateHaruEmotion(emotion) {
      const mouth = document.getElementById('mouth');
      const leftBrow = document.getElementById('leftBrow');
      const rightBrow = document.getElementById('rightBrow');
      const leftBlush = document.getElementById('leftBlush');
      const rightBlush = document.getElementById('rightBlush');

      switch(emotion) {
        case 'happy':
          mouth.setAttribute('d', 'M 120 240 Q 150 260 180 240');
          leftBrow.setAttribute('d', 'M 85 160 Q 110 155 135 160');
          rightBrow.setAttribute('d', 'M 165 160 Q 190 155 215 160');
          leftBlush.setAttribute('opacity', '0.6');
          rightBlush.setAttribute('opacity', '0.6');
          break;
        case 'thinking':
          mouth.setAttribute('d', 'M 130 245 L 160 245');
          leftBrow.setAttribute('d', 'M 85 155 Q 110 150 135 155');
          rightBrow.setAttribute('d', 'M 165 165 Q 190 160 215 165');
          break;
        case 'confused':
          mouth.setAttribute('d', 'M 120 250 Q 150 245 180 250');
          leftBrow.setAttribute('d', 'M 85 155 Q 110 145 135 150');
          rightBrow.setAttribute('d', 'M 165 150 Q 190 145 215 155');
          leftBlush.setAttribute('opacity', '0.9');
          rightBlush.setAttribute('opacity', '0.9');
          break;
      }
    }

    function askNextQuestion() {
      currentQAIndex = (currentQAIndex + 1) % QA_PAIRS.length;
      const qa = QA_PAIRS[currentQAIndex];
      currentQuestion = qa;
      
      addMessage('haru', qa.question, Math.floor(Math.random() * 170) + 280);
      
      setTimeout(() => {
        const answer = currentMode === 'analogy' ? qa.analogyAnswer : qa.answer;
        addMessage('haru', answer, Math.floor(Math.random() * 170) + 350);
        showAnswerChoices(qa.choices);
      }, 1500);
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      addMessage('student', message);
      input.value = '';
      
      // Start with first question
      setTimeout(() => {
        askNextQuestion();
      }, 1000);
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      addMessage('haru', "Hi! I'm Haru, your AI teacher. Let me ask you some questions to check your understanding! 🌸", 320);
      
      setTimeout(() => {
        askNextQuestion();
      }, 2000);
    });

    // Handle Enter key
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
