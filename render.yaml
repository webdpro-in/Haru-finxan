services:
  - type: web
    name: haru-ai-teacher
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # === REQUIRED ===
      - key: GROQ_API_KEY
        sync: false                  # set in Render dashboard
      - key: JWT_SECRET
        generateValue: true          # Render generates a 32+ char secret
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: IMAGE_PROVIDER
        value: wikimedia
      - key: NODE_ENV
        value: production
      # === Frontend origin for CORS — set this to your Amplify/Vercel URL ===
      - key: FRONTEND_URL
        sync: false                  # e.g. https://haru.your-domain.com
      # === Optional: Supabase persistent users + credit ledger ===
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # === Optional: alternate AI providers ===
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
